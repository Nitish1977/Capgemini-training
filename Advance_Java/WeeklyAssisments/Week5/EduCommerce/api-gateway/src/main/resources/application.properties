server.port=8080
spring.application.name=api-gateway

spring.config.import=optional:configserver:http://localhost:8888

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=student-service
spring.cloud.gateway.routes[0].uri=lb://student-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**, /students/**, /courses/**, /enroll/**

spring.cloud.gateway.routes[1].id=attendance-service
spring.cloud.gateway.routes[1].uri=lb://attendance-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/attendance/**

spring.cloud.gateway.routes[2].id=result-service
spring.cloud.gateway.routes[2].uri=lb://result-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/results/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

jwt.secret=${JWT_SECRET:bXlTZWNyZXRLZXlGb3JFZHVDb21tZXJjZUFwcGxpY2F0aW9u}

management.endpoints.web.exposure.include=*
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging.level.org.springframework.cloud.gateway=DEBUG
