<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>All Books</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <h2>Library Books</h2>

    <!-- Navigation Buttons -->
    <div class="btn-group">

        <a class="addBook"
           th:href="@{/books/add}">
            Add Book
        </a>

        <a class="dashboard"
           th:href="@{/dashboard}">
            Dashboard
        </a>

        <a class="delete"
           th:href="@{/login}">
            Logout
        </a>

    </div>

    <br><br>

    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>

        <tr th:each="b : ${books}">
            <td th:text="${b.id}"></td>
            <td th:text="${b.title}"></td>
            <td th:text="${b.author}"></td>
            <td th:text="${b.price}"></td>

            <td>
                <a th:href="@{/books/{id}(id=${b.id})}">
                    View
                </a>

                <a class="delete"
                   th:href="@{/books/delete/{id}(id=${b.id})}">
                    Delete
                </a>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
