server.port=8080

spring.application.name=api-gateway

# Disable Spring MVC auto-config (Gateway uses WebFlux)
spring.main.web-application-type=reactive

# Route: Doctor Service
spring.cloud.gateway.routes[0].id=doctor-service-route
spring.cloud.gateway.routes[0].uri=lb://doctor-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/doctor/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Route: Appointment Service
spring.cloud.gateway.routes[1].id=appointment-service-route
spring.cloud.gateway.routes[1].uri=lb://appointment-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/appointment/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.mediconnect=DEBUG
